<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイピング忍者</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #fff;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* 背景の月 */
  #moon {
    position: absolute;
    top: 40px;
    right: 80px;
    width: 80px;
    height: 80px;
    background: radial-gradient(circle at 35% 35%, #fffde7, #f9a825);
    border-radius: 50%;
    box-shadow: 0 0 40px #f9a82588, 0 0 80px #f9a82533;
  }

  /* 地面 */
  #ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: linear-gradient(to bottom, #1a1a2e, #16213e);
    border-top: 2px solid #00ffcc33;
  }

  /* 桜の木のシルエット */
  .tree {
    position: absolute;
    bottom: 58px;
    font-size: 80px;
    opacity: 0.3;
    filter: hue-rotate(180deg) brightness(0.4);
  }

  /* スコア・UI */
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 100;
  }

  #score-display {
    font-size: 14px;
    color: #00ffcc;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #score-display span {
    font-size: 32px;
    font-weight: bold;
    display: block;
  }

  #combo-display {
    margin-top: 8px;
    font-size: 14px;
    color: #ff6b6b;
    height: 20px;
    transition: transform 0.1s;
  }

  #combo-display.pop {
    transform: scale(1.3);
    color: #ffd700;
  }

  #lives {
    margin-top: 8px;
    font-size: 18px;
  }

  /* 入力フィールド */
  #input-area {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    text-align: center;
  }

  #typed-input {
    background: rgba(0, 255, 204, 0.08);
    border: 2px solid #00ffcc55;
    border-radius: 8px;
    color: #00ffcc;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    letter-spacing: 4px;
    outline: none;
    padding: 10px 24px;
    min-width: 300px;
    text-align: center;
    caret-color: #00ffcc;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #typed-input:focus {
    border-color: #00ffcc;
    box-shadow: 0 0 20px #00ffcc44;
  }

  #typed-input.shake {
    animation: shake 0.3s;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* 単語 */
  .word {
    position: absolute;
    font-size: 18px;
    font-weight: bold;
    white-space: nowrap;
    cursor: default;
    transition: color 0.1s;
    text-shadow: 0 0 12px currentColor;
  }

  .word.targeted {
    color: #ffd700;
    text-shadow: 0 0 16px #ffd70099;
  }

  .word .typed-part {
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
  }

  .word .remaining-part {
    color: #ff6b6b;
    text-shadow: 0 0 10px #ff6b6b66;
  }

  .word.targeted .remaining-part {
    color: #ffd700;
  }

  /* 斬撃エフェクト */
  .slash {
    position: absolute;
    pointer-events: none;
    font-size: 36px;
    z-index: 200;
    animation: slash-anim 0.5s forwards;
  }

  @keyframes slash-anim {
    0%   { opacity: 1; transform: scale(0.5) rotate(-20deg); }
    50%  { opacity: 1; transform: scale(1.4) rotate(10deg); }
    100% { opacity: 0; transform: scale(0.8) rotate(30deg) translateY(-30px); }
  }

  /* スコアポップ */
  .score-pop {
    position: absolute;
    pointer-events: none;
    font-size: 20px;
    font-weight: bold;
    color: #ffd700;
    z-index: 200;
    animation: score-pop-anim 0.8s forwards;
  }

  @keyframes score-pop-anim {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  /* ミスエフェクト */
  .miss-flash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255, 0, 0, 0.15);
    pointer-events: none;
    z-index: 50;
    animation: miss-anim 0.3s forwards;
  }

  @keyframes miss-anim {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* スタート・ゲームオーバー画面 */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 15, 0.88);
    z-index: 300;
  }

  #overlay h1 {
    font-size: 56px;
    letter-spacing: 8px;
    color: #00ffcc;
    text-shadow: 0 0 30px #00ffcc;
    margin-bottom: 12px;
  }

  #overlay .subtitle {
    font-size: 16px;
    color: #ffffff88;
    margin-bottom: 40px;
    letter-spacing: 3px;
  }

  #overlay .final-score {
    font-size: 22px;
    color: #ffd700;
    margin-bottom: 12px;
  }

  #start-btn {
    background: transparent;
    border: 2px solid #00ffcc;
    color: #00ffcc;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    letter-spacing: 4px;
    padding: 14px 40px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 20px #00ffcc44;
  }

  #start-btn:hover {
    background: #00ffcc22;
    box-shadow: 0 0 40px #00ffcc88;
    transform: scale(1.05);
  }

  #difficulty-select {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .diff-btn {
    background: transparent;
    border: 1px solid #ffffff44;
    color: #ffffff88;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 8px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .diff-btn.active {
    border-color: #00ffcc;
    color: #00ffcc;
    box-shadow: 0 0 12px #00ffcc44;
  }

  /* レベル表示 */
  #level-display {
    position: absolute;
    top: 20px;
    right: 20px;
    text-align: right;
    color: #ffffff66;
    font-size: 13px;
    letter-spacing: 2px;
  }

  #level-display span {
    display: block;
    font-size: 22px;
    color: #ff6b6b;
    font-weight: bold;
  }

  /* 進行バー */
  #progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(to right, #00ffcc, #ffd700);
    transition: width 0.5s;
    z-index: 200;
    box-shadow: 0 0 8px #00ffcc;
  }
</style>
</head>
<body>
<div id="game-container">
  <div id="progress-bar" style="width:0%"></div>
  <div id="moon"></div>

  <!-- 背景の木 -->
  <div class="tree" style="left:5%">🌸</div>
  <div class="tree" style="left:15%">🎋</div>
  <div class="tree" style="right:8%">🌸</div>
  <div class="tree" style="right:20%">🎋</div>

  <div id="hud">
    <div id="score-display">
      スコア
      <span id="score">0</span>
    </div>
    <div id="combo-display"></div>
    <div id="lives"></div>
  </div>

  <div id="level-display">
    レベル
    <span id="level">1</span>
  </div>

  <div id="ground"></div>

  <div id="input-area">
    <input id="typed-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="ここに入力..." />
  </div>

  <!-- オーバーレイ (スタート/ゲームオーバー) -->
  <div id="overlay">
    <h1>⚔️ タイピング忍者</h1>
    <p class="subtitle">TYPING NINJA</p>
    <p id="final-score-display" class="final-score" style="display:none"></p>
    <div id="difficulty-select">
      <button class="diff-btn active" data-diff="easy">かんたん</button>
      <button class="diff-btn" data-diff="normal">ふつう</button>
      <button class="diff-btn" data-diff="hard">むずかしい</button>
    </div>
    <button id="start-btn">はじめる</button>
  </div>
</div>

<script>
const WORDS = {
  easy: [
    'cat','dog','sun','run','sky','fly','red','jump','star','moon',
    'fire','wind','rain','snow','bird','fish','tree','lake','rock','sand'
  ],
  normal: [
    'ninja','sword','shadow','attack','castle','dragon','flower','forest',
    'bridge','temple','master','battle','spirit','shield','arrow','hunter',
    'legend','mystic','energy','danger','swift','power','storm','thunder'
  ],
  hard: [
    'javascript','typescript','algorithm','recursion','expression','performance',
    'framework','component','interface','repository','encryption','blockchain',
    'parameter','subroutine','polymorphism','asynchronous','intersection','middleware'
  ]
};

const COLORS = ['#ff6b6b','#ffd700','#ff9f43','#a29bfe','#fd79a8','#74b9ff'];

let state = {
  score: 0,
  combo: 0,
  lives: 3,
  level: 1,
  words: [],
  interval: null,
  spawnTimer: null,
  difficulty: 'easy',
  running: false,
  wordsKilled: 0,
  nextSpawnIn: 2500,
  wordSpeed: 1.2,
};

const overlay    = document.getElementById('overlay');
const startBtn   = document.getElementById('start-btn');
const input      = document.getElementById('typed-input');
const scoreEl    = document.getElementById('score');
const comboEl    = document.getElementById('combo-display');
const livesEl    = document.getElementById('lives');
const levelEl    = document.getElementById('level');
const progressEl = document.getElementById('progress-bar');
const container  = document.getElementById('game-container');
const finalScore = document.getElementById('final-score-display');

// 難易度ボタン
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.difficulty = btn.dataset.diff;
  });
});

startBtn.addEventListener('click', startGame);

function startGame() {
  overlay.style.display = 'none';
  finalScore.style.display = 'none';
  state.score = 0;
  state.combo = 0;
  state.lives = 3;
  state.level = 1;
  state.wordsKilled = 0;
  state.words = [];
  state.running = true;
  state.nextSpawnIn = 2500;
  state.wordSpeed = state.difficulty === 'easy' ? 0.7 : state.difficulty === 'normal' ? 1.1 : 1.7;

  // 既存の単語を削除
  document.querySelectorAll('.word').forEach(w => w.remove());

  updateHUD();
  input.value = '';
  input.focus();

  scheduleSpawn();
  state.interval = requestAnimationFrame(gameLoop);
}

function scheduleSpawn() {
  if (!state.running) return;
  clearTimeout(state.spawnTimer);
  state.spawnTimer = setTimeout(() => {
    spawnWord();
    scheduleSpawn();
  }, state.nextSpawnIn);
}

function spawnWord() {
  const wordList = WORDS[state.difficulty];
  const text = wordList[Math.floor(Math.random() * wordList.length)];
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];

  const el = document.createElement('div');
  el.className = 'word';
  el.dataset.word = text;
  el.dataset.typed = '';
  el.style.color = color;
  el.style.top = Math.random() * (window.innerHeight - 200) + 50 + 'px';
  el.style.left = window.innerWidth + 20 + 'px';
  el.innerHTML = `<span class="typed-part"></span><span class="remaining-part">${text}</span>`;
  container.appendChild(el);
  state.words.push(el);
}

let lastTime = 0;
function gameLoop(timestamp) {
  if (!state.running) return;
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  const speed = state.wordSpeed * (dt / 16);
  const toRemove = [];

  state.words.forEach(el => {
    const currentLeft = parseFloat(el.style.left) - speed;
    el.style.left = currentLeft + 'px';

    if (currentLeft + el.offsetWidth < 0) {
      toRemove.push(el);
    }
  });

  toRemove.forEach(el => {
    el.remove();
    state.words = state.words.filter(w => w !== el);
    loseLife();
  });

  requestAnimationFrame(gameLoop);
}

function loseLife() {
  state.lives--;
  state.combo = 0;
  updateHUD();
  flashMiss();

  if (state.lives <= 0) {
    gameOver();
  }
}

function flashMiss() {
  const flash = document.createElement('div');
  flash.className = 'miss-flash';
  container.appendChild(flash);
  setTimeout(() => flash.remove(), 300);
}

input.addEventListener('input', () => {
  const val = input.value.trim().toLowerCase();
  if (!val || !state.running) return;

  // ターゲット単語を探す (前方一致、typed部分が最も長いもの)
  let best = null;
  let bestLen = -1;

  state.words.forEach(el => {
    const word = el.dataset.word;
    if (word.startsWith(val) && val.length > bestLen) {
      best = el;
      bestLen = val.length;
    }
  });

  // ハイライト更新
  state.words.forEach(el => {
    const word = el.dataset.word;
    el.classList.remove('targeted');
    if (word.startsWith(val)) {
      el.classList.add('targeted');
      el.querySelector('.typed-part').textContent = val;
      el.querySelector('.remaining-part').textContent = word.slice(val.length);
    } else {
      el.querySelector('.typed-part').textContent = '';
      el.querySelector('.remaining-part').textContent = word;
    }
  });

  if (!best) return;

  const word = best.dataset.word;

  if (val === word) {
    // 完全一致！
    killWord(best);
    input.value = '';
  }
});

function killWord(el) {
  const rect = el.getBoundingClientRect();
  const word = el.dataset.word;

  el.remove();
  state.words = state.words.filter(w => w !== el);

  state.combo++;
  state.wordsKilled++;

  const points = Math.max(10, word.length * 10) * (1 + Math.floor(state.combo / 3) * 0.5);
  state.score += Math.floor(points);

  // 斬撃エフェクト
  const slash = document.createElement('div');
  slash.className = 'slash';
  slash.style.left = rect.left + 'px';
  slash.style.top = rect.top + 'px';
  slash.textContent = ['⚔️','✨','💥','🌟','🔥'][Math.floor(Math.random() * 5)];
  container.appendChild(slash);
  setTimeout(() => slash.remove(), 500);

  // スコアポップ
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.style.left = rect.left + 'px';
  pop.style.top = (rect.top - 10) + 'px';
  pop.textContent = `+${Math.floor(points)}`;
  if (state.combo > 2) pop.textContent += ` x${state.combo}コンボ！`;
  container.appendChild(pop);
  setTimeout(() => pop.remove(), 800);

  // コンボ表示を弾ませる
  comboEl.classList.remove('pop');
  void comboEl.offsetWidth;
  comboEl.classList.add('pop');
  setTimeout(() => comboEl.classList.remove('pop'), 200);

  // レベルアップ
  const newLevel = Math.floor(state.wordsKilled / 8) + 1;
  if (newLevel > state.level) {
    state.level = newLevel;
    state.wordSpeed *= 1.15;
    state.nextSpawnIn = Math.max(800, state.nextSpawnIn * 0.88);
  }

  updateHUD();
}

function updateHUD() {
  scoreEl.textContent = state.score.toLocaleString();
  levelEl.textContent = state.level;
  livesEl.textContent = '❤️'.repeat(state.lives) + '🖤'.repeat(Math.max(0, 3 - state.lives));

  if (state.combo >= 3) {
    comboEl.textContent = `🔥 ${state.combo}コンボ！`;
  } else {
    comboEl.textContent = '';
  }

  const progress = Math.min(100, (state.wordsKilled % 8) / 8 * 100);
  progressEl.style.width = progress + '%';
}

function gameOver() {
  state.running = false;
  clearTimeout(state.spawnTimer);
  document.querySelectorAll('.word').forEach(w => w.remove());
  state.words = [];

  overlay.style.display = 'flex';
  finalScore.style.display = 'block';
  finalScore.textContent = `スコア: ${state.score.toLocaleString()}  |  ${state.wordsKilled}語斬！  |  最大レベル: ${state.level}`;
  startBtn.textContent = 'もう一度';
}

// フォーカスを常に保持
document.addEventListener('click', () => {
  if (state.running) input.focus();
});
</script>
</body>
</html>
